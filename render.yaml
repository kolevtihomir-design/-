services:
  - type: web
    name: ai-pokupki
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: EASYSHIP_API_KEY
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_URL
        sync: false
